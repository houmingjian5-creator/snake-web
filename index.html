<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>霓虹贪吃蛇</title>
    <meta
      name="description"
      content="一个可在电脑和手机上玩的网页版贪吃蛇游戏。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="霓虹贪吃蛇游戏">
      <section class="playfield" aria-label="游戏区">
        <div class="topbar">
          <div>
            <p class="eyebrow">SNAKE ONLINE</p>
            <h1>霓虹贪吃蛇</h1>
          </div>
          <button class="icon-button" id="shareButton" type="button" aria-label="分享游戏">
            ↗
          </button>
        </div>

        <div class="board-wrap">
          <canvas id="gameCanvas" width="560" height="560" aria-label="贪吃蛇画布"></canvas>
          <div class="overlay" id="overlay">
            <p id="overlayTitle">准备开始</p>
            <span id="overlayHint">按空格或点击开始</span>
          </div>
        </div>

        <div class="controls" aria-label="手机方向控制">
          <button type="button" data-dir="up" aria-label="向上">↑</button>
          <button type="button" data-dir="left" aria-label="向左">←</button>
          <button type="button" data-dir="down" aria-label="向下">↓</button>
          <button type="button" data-dir="right" aria-label="向右">→</button>
        </div>
      </section>

      <aside class="panel" aria-label="状态和操作">
        <div class="score-grid">
          <div>
            <span>分数</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>最高</span>
            <strong id="best">0</strong>
          </div>
          <div>
            <span>速度</span>
            <strong id="speed">1x</strong>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="startButton" type="button">开始</button>
          <button id="pauseButton" type="button">暂停</button>
          <button id="resetButton" type="button">重开</button>
        </div>

        <div class="settings">
          <label for="difficulty">难度</label>
          <select id="difficulty">
            <option value="easy">轻松</option>
            <option value="normal" selected>标准</option>
            <option value="hard">刺激</option>
          </select>
        </div>

        <div class="mini-map" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p class="note" id="shareStatus">
          电脑用方向键或 WASD，手机可滑动或点击方向键。
        </p>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
